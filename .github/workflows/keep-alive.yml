name: Keep backend awake

# Render's free tier spins the service down after ~15 minutes with no inbound
# traffic, causing a ~1 minute cold start on the next request. This workflow
# pings the public /healthz endpoint on a schedule so the idle timer never
# reaches 15 minutes, keeping the backend warm.

on:
  schedule:
    # Every 10 minutes (cron is UTC). GitHub schedules are best-effort and can
    # be delayed under load — if you still see cold starts, tighten to "*/5".
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # lets you trigger a ping manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          URL="https://momentum-pwoj.onrender.com/healthz"
          echo "Pinging $URL at $(date -u)"
          # --max-time 90 tolerates a cold start if it had already gone to sleep
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL")
          echo "Responded with HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Health check returned $code (expected 200)"
            exit 1
          fi
          echo "Backend is awake."

name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"

  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Ping Render
        run: |
          URL="https://momentum-pwoj.onrender.com/healthz"

          echo "[$(date -u)] Pinging $URL"

          for i in {1..3}; do
            STATUS=$(curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 20 \
              --max-time 90 \
              --retry 3 \
              --retry-delay 5 \
              --write-out "%{http_code}" \
              --output /dev/null \
              "$URL")

            echo "Attempt $i -> HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi

            sleep 10
          done

          echo "Backend did not respond successfully."
          exit 1
